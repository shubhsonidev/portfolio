<div class="portfolio-card" (mousemove)="onMouseMove($event)" data-aos="zoom-in-up" data-aos-duration="1000" [attr.data-aos-delay]="(index % 3) * 150">
  <div class="image-wrapper">
    <img
      id="portfolioitem{{ index }}"
      class="portfolio-image fade-in"
      src="{{ portfolioItem.mainImage }}"
      alt="{{ portfolioItem['title'] }} image"
      loading="lazy"
    />
  </div>
  
  <div class="infos-container">
    <h3 class="card-title">
      {{ portfolioItem.title }}
    </h3>

    <p class="card-description" *ngIf="portfolioItem.description">
      {{ portfolioItem.description }}
    </p>

    <div class="card-tags" *ngIf="portfolioItem.tags && portfolioItem.tags.length">
      <span class="tag" *ngFor="let tag of portfolioItem.tags">{{ tag }}</span>
    </div>

    <div class="btn-container card-actions">
      <a
        *ngIf="portfolioItem.gitLink"
        [href]="portfolioItem.gitLink"
        target="_blank"
      >
        <button class="secondary-btn small-btn">Github</button>
      </a>

      <a
        *ngIf="portfolioItem.backendLink"
        [href]="portfolioItem.backendLink"
        target="_blank"
      >
        <button class="tertiary-btn small-btn">Backend Live</button>
      </a>

      <a
        *ngIf="portfolioItem.liveLink"
        [href]="portfolioItem.liveLink"
        target="_blank"
      >
        <button class="tertiary-btn small-btn">Live Link</button>
      </a>
      
      <a
        *ngIf="portfolioItem.contact"
        (click)="scrollToContact()"
      >
        <button class="tertiary-btn small-btn">Contact For Demo</button>
      </a>
    </div>
  </div>
</div>
