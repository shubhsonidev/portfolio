<div
  class="line-skills"
  data-aos="fade-zoom-in-right"
  data-aos-easing="ease-in"
  data-aos-offset="0"
  data-aos-delay="1000"
></div>
<div
  #skillsSection
  class="skills-container"
  data-aos="fade-up"
  data-aos-duration="1000"
>
  <div class="skills-intro">
    <h2>Tech Stack</h2>
    <div>
      I've built production applications with a diverse set of technologies
      across the full stack.
    </div>
    <div class="btn-container hidemobile">
      <button class="main-btn" (click)="scrollToContact()">Get in touch</button>
    </div>
  </div>
  <div
    class="skills-categories-container"
    data-aos="fade-up"
    data-aos-duration="1000"
  >
    <div class="skill-category" *ngFor="let category of skillCategories">
      <h4 class="category-title">{{ category.category }}</h4>
      <div class="category-divider"></div>
      <ul class="skill-list">
        <li *ngFor="let skill of category.skills" class="skill-list-item">
          {{ skill }}
        </li>
      </ul>
    </div>
  </div>
  <div class="btn-container hidedesktop">
    <button class="main-btn" (click)="scrollToContact()">Get in touch</button>
  </div>
  <img
    class="skills-bg-form"
    src="https://shubhsonidev.github.io/portfolio/assets/img/bg/blue-shadow-left.png"
  />
</div>
