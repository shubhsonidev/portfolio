<div class="hero-section">
  <!-- Background glow blobs -->
  <div class="hero-glow hero-glow--left"></div>
  <div class="hero-glow hero-glow--right"></div>

  <img class="bg-shape" src="https://shubhsonidev.github.io/portfolio/assets/img/bg/bg1.png" alt="" />

  <div class="hero-content">
    <!-- Top: Text -->
    <div class="hero-text" data-aos="fade-up" data-aos-duration="1000">
      <div class="hero-heading mt-5">
        <div class="greeting">Hi, I'm</div>
        <h1 class="hero-name">Shubh Soni</h1>
        <div class="hero-role" [class.title-fading]="titleFading">
          {{ currentTitle }}
        </div>
      </div>
      <p class="hero-tagline">
        I specialize in building high-performance web applications, leveraging my experience with fintech platforms
        (used
        by over 350k users) and
        complex software to solve diverse real-world problems.
      </p>
      <div class="hero-actions">
        <div class="cta-wrapper" (click)="scrollToPortfolio()">
          <button class="hero-cta">
            <span class="cta-text">View My Work</span>
            <svg class="cta-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14" />
              <path d="m19 12-7 7-7-7" />
            </svg>
          </button>
        </div>
      </div>
      <div class="hero-socials">
        <a class="social-icon" href="https://github.com/shubhsonidev" target="_blank" rel="noopener noreferrer"
          aria-label="GitHub">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
          </svg>
        </a>
        <a class="social-icon" href="https://www.linkedin.com/in/shubhsoni-dev/" target="_blank"
          rel="noopener noreferrer" aria-label="LinkedIn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Bottom: Interactive Terminal -->
    <div class="terminal" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400" (click)="focusInput()">
      <div class="terminal-header">
        <div class="terminal-dots">
          <span class="dot dot--red"></span>
          <span class="dot dot--yellow"></span>
          <span class="dot dot--green"></span>
        </div>
        <span class="terminal-title">shubh@dev ~ </span>
      </div>
      <div class="terminal-body" #terminalBody>
        <div *ngFor="let line of terminalLines; let i = index" class="terminal-line" [class.visible]="line.visible"
          [class.command]="line.type === 'command'" [class.output]="line.type === 'output'"
          [class.blank]="line.type === 'blank'" [class.error]="line.type === 'error'"
          [class.header]="line.type === 'header'">
          {{ line.text }}
        </div>
        <!-- Interactive input line -->
        <div class="terminal-input-line" *ngIf="isTerminalReady">
          <span class="cursor-prompt">$</span>
          <input #terminalInput type="text" class="terminal-text-input" [(ngModel)]="currentInput"
            (keydown.enter)="executeCommand($event)" (keydown)="onKeyDown($event)" spellcheck="false" autocomplete="off"
            placeholder="type 'help' for commands..." />
        </div>
        <!-- Boot cursor (before interactive mode) -->
        <div class="terminal-cursor" *ngIf="!isTerminalReady">
          <span class="cursor-prompt">$</span>
          <span class="cursor-blink">▊</span>
        </div>
      </div>
    </div>
  </div>
</div>
